services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: behavioral_drift
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8003:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/behavioral_drift
      SECRET_KEY: ${SECRET_KEY:-dk_XFNuYuX38EncMDLB97K84YwXlGE9n-V8qzLp_HLs2W0}
      APP_ENV: ${APP_ENV:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5176}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
